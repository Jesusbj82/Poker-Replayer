<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Top Pro – Hand Replay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: radial-gradient(ellipse at 50% 30%, #1a1a0a 0%, #0a0a0a 100%);
  font-family: 'Roboto Condensed', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 18px 16px 30px; overflow-x: hidden;
}

/* ══════════════════════════════════════════ */
/* FORM STYLES */
/* ══════════════════════════════════════════ */
.form-wrap {
  width: 100%; max-width: 520px; margin: 0 auto;
  background: rgba(0,0,0,0.4); border-radius: 12px; padding: 2rem 1.5rem;
}
.form-wrap.hidden { display: none; }
.cards-icon { display: flex; justify-content: center; gap: 3px; margin-bottom: 16px; }
.mini-card {
  width: 24px; height: 34px; border-radius: 3px; border: 1px solid #555;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: 'Roboto Condensed', sans-serif; font-weight: 800; line-height: 1;
}
.mini-card.back { background: linear-gradient(145deg, #1e3a72, #0d2044); border-color: #2a4a8a; }
.mini-card.face { background: #f5f0e8; border-color: #bbb; padding: 2px; color: #cc2200; }
.mini-card .mc-rank { font-size: 11px; }
.mini-card .mc-suit { font-size: 9px; }
.form-title {
  font-family: 'Cinzel', serif; color: #c9a84c; font-size: 1.2rem;
  letter-spacing: 0.15em; text-align: center; margin-bottom: 6px;
  text-shadow: 0 0 24px rgba(201,168,76,0.5);
}
.form-subtitle { color: #777; font-size: 0.72rem; text-align: center; margin-bottom: 24px; letter-spacing: 0.05em; }
.form-row { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 0.65rem; color: #c9a84c; letter-spacing: 0.12em;
  text-transform: uppercase; margin-bottom: 6px; font-weight: 700;
}
.toggle-group { display: flex; }
.toggle-btn {
  flex: 1; padding: 10px 0; text-align: center; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.08em; border: 1.5px solid #333; color: #888;
  background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.2s;
  font-family: 'Roboto Condensed', sans-serif;
}
.toggle-btn:first-child { border-radius: 6px 0 0 6px; }
.toggle-btn:last-child { border-radius: 0 6px 6px 0; }
.toggle-btn.active { background: rgba(201,168,76,0.15); border-color: #c9a84c; color: #c9a84c; }
.input-row { display: flex; gap: 10px; }
.input-row .form-row { flex: 1; }
.form-input {
  width: 100%; padding: 10px 12px; font-size: 0.85rem; font-family: 'Roboto Condensed', sans-serif;
  background: rgba(255,255,255,0.05); border: 1.5px solid #333; border-radius: 6px;
  color: #e0d8c0; outline: none; transition: border-color 0.2s;
}
.form-input:focus { border-color: #c9a84c; }
.form-input::placeholder { color: #555; }
.form-textarea {
  width: 100%; min-height: 120px; padding: 12px; font-size: 0.8rem;
  font-family: 'Roboto Condensed', sans-serif; line-height: 1.5;
  background: rgba(255,255,255,0.05); border: 1.5px solid #333; border-radius: 6px;
  color: #e0d8c0; outline: none; resize: vertical; transition: border-color 0.2s;
}
.form-textarea:focus { border-color: #c9a84c; }
.form-textarea::placeholder { color: #555; }
.form-question {
  width: 100%; min-height: 50px; padding: 10px 12px; font-size: 0.8rem;
  font-family: 'Roboto Condensed', sans-serif;
  background: rgba(201,168,76,0.05); border: 1.5px solid #5a4a20; border-radius: 6px;
  color: #e8d8a0; outline: none; resize: vertical; transition: border-color 0.2s;
}
.form-question:focus { border-color: #c9a84c; }
.form-question::placeholder { color: #6a5a30; }
.submit-btn {
  display: block; width: 100%; padding: 14px 0; font-family: 'Cinzel', serif; font-size: 0.85rem;
  font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase;
  text-align: center; color: #1a0f00;
  background: linear-gradient(135deg, #c9a84c, #a07830);
  border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.submit-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.submit-btn:disabled { opacity: 0.5; cursor: wait; transform: none; filter: none; }
.ante-row { display: none; }
.ante-row.show { display: block; }
.divider { height: 1px; background: linear-gradient(90deg, transparent, #333, transparent); margin: 20px 0; }
.error-msg { color: #cc4444; font-size: 0.7rem; text-align: center; margin-top: 10px; display: none; }
.error-msg.show { display: block; }

/* LOADING OVERLAY */
.loading-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 5000; flex-direction: column; align-items: center; justify-content: center;
}
.loading-overlay.show { display: flex; }
.loading-spinner {
  width: 40px; height: 40px; border: 3px solid #333; border-top-color: #c9a84c;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: #c9a84c; font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.15em; margin-top: 16px; }

/* ══════════════════════════════════════════ */
/* REPLAY STYLES */
/* ══════════════════════════════════════════ */
.replay-wrap { width: 100%; display: none; flex-direction: column; align-items: center; }
.replay-wrap.show { display: flex; }

.new-hand-btn {
  display: inline-block; padding: 8px 24px;
  font-family: 'Roboto Condensed', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: #c9a84c;
  border: 1px solid #c9a84c; border-radius: 6px; background: transparent;
  cursor: pointer; transition: all 0.2s;
}
.new-hand-btn:hover { background: rgba(201,168,76,0.1); }
.share-btn {
  display: inline-block; padding: 8px 24px;
  font-family: 'Roboto Condensed', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: #1a0f00;
  background: linear-gradient(135deg, #c9a84c, #a07830);
  border: none; border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.share-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
.bottom-actions { display: flex; gap: 12px; margin-top: 14px; justify-content: center; align-items: center; }
.share-toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.9); border: 1px solid #c9a84c; border-radius: 8px;
  padding: 10px 24px; font-size: 0.75rem; color: #c9a84c; letter-spacing: 0.08em;
  opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 3000;
}
.share-toast.show { opacity: 1; }

.table-wrap { width: 100%; max-width: 900px; position: relative; }
.table {
  width: 100%; aspect-ratio: 16/9;
  background: radial-gradient(ellipse at 50% 40%, #2e7040 0%, #1b5030 45%, #0e2e18 100%);
  border-radius: 50%; border: 20px solid #3b2006;
  box-shadow: 0 0 0 5px #5c3510, 0 0 0 9px #2a1503, 0 28px 80px rgba(0,0,0,0.95), inset 0 0 80px rgba(0,0,0,0.35);
  position: relative; overflow: visible;
}
.table::before {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 3px),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 3px);
  pointer-events: none;
}
.dealer-btn {
  position: absolute; width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(180deg, #fff, #e0ddd5); border: 2px solid #ccc;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 0.6rem; font-weight: 800;
  color: #222; box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.8);
  z-index: 15; opacity: 0; transition: opacity 0.4s; pointer-events: none;
}
.dealer-btn.show { opacity: 1; }
.street-label {
  position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
  font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.25em;
  color: #c9a84c; text-shadow: 0 0 12px rgba(201,168,76,0.6);
  opacity: 0; transition: opacity 0.4s; white-space: nowrap; pointer-events: none;
}
.street-label.show { opacity: 1; }
.board-area {
  position: absolute; top: 36%; left: 50%;
  transform: translate(-50%, -50%); display: flex; gap: 7px; align-items: center;
}
.board-card {
  width: 50px; height: 72px; border-radius: 7px; border: 1.5px solid #bbb;
  background: #f5f0e8; display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-start; padding: 3px 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.55); font-family: 'Roboto Condensed', sans-serif;
  font-weight: 800; font-size: 1.2rem; line-height: 1.1;
  opacity: 0; transform: translateY(-14px) scale(0.85); transition: opacity 0.35s, transform 0.35s;
}
.board-card.show { opacity: 1; transform: translateY(0) scale(1); }
.board-card.red { color: #cc2200; }
.board-card.black { color: #111; }
.board-card .rank { font-size: 1.2rem; }
.board-card .suit { font-size: 1rem; }
.pot-display {
  position: absolute; top: 60%; left: 60%;
  background: rgba(0,0,0,0.65); border: 1px solid #c9a84c; border-radius: 20px;
  padding: 3px 14px; font-size: 0.72rem; color: #f0d080;
  letter-spacing: 0.1em; white-space: nowrap; opacity: 0; transition: opacity 0.4s;
}
.pot-display.show { opacity: 1; }
.pot-chip-zone {
  position: absolute; top: 55%; left: 42%;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 10;
}
.pot-chip-zone.show { opacity: 1; }
.pot-chip-label {
  font-size: 0.7rem; font-weight: 700; color: #f0d080;
  background: rgba(0,0,0,0.8); border: 1px solid #c9a84c;
  border-radius: 10px; padding: 2px 10px; letter-spacing: 0.06em;
  white-space: nowrap; margin-top: 4px;
}
.ante-zone {
  position: absolute; top: 45%; left: 60%;
  display: flex; align-items: center; gap: 4px;
  opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 10;
}
.ante-zone.show { opacity: 1; }
.ante-zone .chip { width: 22px; height: 8px; margin-bottom: -4px; }
.ante-zone .chip::after { inset: 1px 4px; }
.ante-label {
  font-size: 0.55rem; font-weight: 700; color: #d4a050;
  background: rgba(0,0,0,0.7); border: 1px solid #886633;
  border-radius: 6px; padding: 1px 6px; letter-spacing: 0.06em; white-space: nowrap;
}
.flying-chip {
  position: fixed; z-index: 2000; pointer-events: none;
  width: 30px; height: 11px; border-radius: 50%;
  box-shadow: 0 2px 5px rgba(0,0,0,0.7);
  transition: left 0.45s cubic-bezier(0.4,0,0.2,1), top 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.45s;
}
.player {
  position: absolute; display: flex; flex-direction: column; align-items: center; gap: 4px;
  z-index: 2; transition: opacity 0.5s;
}
.player.faded { opacity: 0.15; pointer-events: none; }
.slot0 { bottom: -2%; left: 50%; transform: translateX(-50%); }
.slot1 { bottom: 12%; left: 4%; }
.slot2 { top: 18%; left: -1%; }
.slot3 { top: -2%; left: 14%; }
.slot4 { top: -6%; left: 50%; transform: translateX(-50%); }
.slot5 { top: -2%; right: 14%; }
.slot6 { top: 18%; right: -1%; }
.slot7 { bottom: 12%; right: 4%; }
.player-row { display: flex; align-items: center; gap: 6px; }
.seat-label {
  background: rgba(0,0,0,0.78); border: 1.5px solid #444;
  border-radius: 10px; padding: 6px 14px; text-align: center;
  white-space: nowrap; transition: border-color 0.3s, box-shadow 0.3s, opacity 0.4s;
}
.seat-label .pos {
  display: block; font-size: 0.75rem; color: #c9a84c; font-weight: 700;
  letter-spacing: 0.15em; margin-bottom: 3px; font-family: 'Cinzel', serif;
  text-shadow: 0 0 8px rgba(201,168,76,0.4);
}
.name-row { display: flex; align-items: center; gap: 6px; justify-content: center; }
.seat-label .name { font-size: 0.9rem; color: #fff; font-weight: 700; letter-spacing: 0.05em; }
.stack {
  font-size: 0.75rem; color: #80cc80; font-weight: 700;
  background: rgba(0,80,0,0.25); border: 1px solid #2a5a2a; border-radius: 5px; padding: 1px 6px;
}
.seat-label.hero { border-color: #c9a84c; border-width: 2px; background: rgba(0,0,0,0.92); box-shadow: 0 0 18px rgba(201,168,76,0.3); }
.seat-label.hero .pos { font-size: 0.8rem; color: #e8c84a; }
.seat-label.hero .name { font-size: 1rem; }
.seat-label.hero .stack { color: #90dd90; border-color: #3a7a3a; }
.seat-label.lit { border-color: #fff !important; box-shadow: 0 0 14px rgba(255,255,255,0.4) !important; }
.seat-label.folded { opacity: 0.3; }
.hole-cards { display: flex; gap: 3px; min-height: 56px; align-items: center; position: relative; }
.chip-zone {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  min-width: 38px; opacity: 0; transition: opacity 0.35s; pointer-events: none;
}
.chip-zone.show { opacity: 1; }
.chip-stack { display: flex; flex-direction: column-reverse; align-items: center; position: relative; }
.chip {
  width: 30px; height: 11px; border-radius: 50%; margin-bottom: -5px; position: relative;
  box-shadow: 0 2px 5px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.3), inset 0 -1px 0 rgba(0,0,0,0.4);
}
.chip::after { content: ''; position: absolute; inset: 2px 5px; border-radius: 50%; border: 1px dashed rgba(255,255,255,0.25); }
.chip.c1 { background: linear-gradient(180deg, #f0f0f0, #c8c8c8); }
.chip.c5 { background: linear-gradient(180deg, #e83010, #aa1800); }
.chip.c10 { background: linear-gradient(180deg, #3366dd, #1a3a99); }
.chip.c25 { background: linear-gradient(180deg, #33aa55, #1a6633); }
.chip.c100 { background: linear-gradient(180deg, #222222, #000000); }
.chip.c500 { background: linear-gradient(180deg, #aa33cc, #661a88); }
.chip-amount { display: flex; flex-direction: column; align-items: center; gap: 1px; margin-top: 3px; }
.chip-action {
  font-size: 0.6rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 1px 6px; border-radius: 4px 4px 0 0; white-space: nowrap; background: #cc7700; color: #fff;
}
.chip-action.blind { background: #557799; }
.chip-action.ante { background: #886633; }
.chip-value {
  font-size: 0.68rem; font-weight: 700; color: #f0d080; letter-spacing: 0.03em;
  text-align: center; background: rgba(0,0,0,0.75); border-radius: 0 0 4px 4px; padding: 1px 6px; white-space: nowrap;
}
.placed-card {
  width: 46px; height: 66px; border-radius: 6px; border: 1.5px solid #bbb;
  background: #f5f0e8; display: flex; flex-direction: column;
  align-items: flex-start; justify-content: flex-start; padding: 3px 4px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.55); font-family: 'Roboto Condensed', sans-serif;
  font-weight: 800; font-size: 1.1rem; line-height: 1.1;
  opacity: 0; transition: opacity 0.01s, transform 0.15s;
}
.placed-card.face-down { background: linear-gradient(145deg, #1e3a72 20%, #0d2044 100%); border-color: #2a4a8a; }
.placed-card.folded { opacity: 0.2 !important; }
.placed-card.red { color: #cc2200; }
.placed-card.black { color: #111; }
.placed-card .rank { font-size: 1.15rem; }
.placed-card .suit { font-size: 0.95rem; }
.flying-card {
  position: fixed; width: 46px; height: 66px; border-radius: 6px;
  z-index: 1000; pointer-events: none; box-shadow: 0 6px 20px rgba(0,0,0,0.8);
  backface-visibility: hidden; background: linear-gradient(145deg, #1e3a72 20%, #0d2044 100%);
  border: 1.5px solid #2a4a8a;
}
.action-wrap { position: absolute; bottom: 6%; left: 3%; width: auto; text-align: left; }
.action-bubble {
  display: inline-block; background: rgba(0,0,0,0.82);
  border: 1px solid rgba(201,168,76,0.4); border-radius: 10px;
  padding: 4px 12px; font-size: 0.65rem; color: #f0e8d0;
  letter-spacing: 0.04em; opacity: 0; transform: translateX(-6px);
  transition: opacity 0.3s, transform 0.3s; white-space: nowrap; max-width: 300px;
}
.action-bubble.show { opacity: 1; transform: translateX(0); }
.progress-bar { width: 100%; max-width: 900px; height: 3px; background: #1a1a1a; border-radius: 2px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #c9a84c, #e0c060); border-radius: 2px; transition: width 0.5s ease; width: 0%; }
.controls { display: flex; gap: 10px; margin-top: 14px; align-items: center; justify-content: center; }
.ctrl-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid #555;
  background: rgba(0,0,0,0.5); color: #aaa; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.08); }
.ctrl-btn:active { transform: scale(0.92); }
.ctrl-btn.primary { width: 46px; height: 46px; border-color: #c9a84c; color: #c9a84c; background: rgba(201,168,76,0.1); }
.ctrl-btn.primary:hover { background: rgba(201,168,76,0.2); box-shadow: 0 0 12px rgba(201,168,76,0.25); }
.ctrl-btn.restart-btn { color: #c9a84c; border-color: #8a7030; }
.ctrl-btn.restart-btn:hover { color: #e0c060; border-color: #c9a84c; background: rgba(201,168,76,0.1); }
.ctrl-btn svg { width: 14px; height: 14px; fill: currentColor; }
.ctrl-btn.primary svg { width: 18px; height: 18px; }
.check-label {
  font-size: 0.65rem; font-weight: 900; color: #fff; letter-spacing: 0.12em;
  text-transform: uppercase; text-align: center; opacity: 0; transition: opacity 0.3s;
  white-space: nowrap; text-shadow: 0 0 8px rgba(255,255,255,0.4);
  position: absolute; left: 50%; transform: translateX(-50%);
  z-index: 20; pointer-events: none; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 4px;
}
.check-label.show { opacity: 1; }
.question-box {
  width: 100%; max-width: 900px; margin-top: 12px; background: #0f1a0a;
  border: 1px solid #c9a84c; border-radius: 10px; padding: 14px 20px;
  font-size: 0.78rem; color: #e8d8a0; line-height: 1.6; opacity: 0; transition: opacity 0.6s;
}
.question-box.show { opacity: 1; }
.question-box .q-label {
  font-family: 'Cinzel', serif; font-size: 0.62rem; color: #c9a84c;
  letter-spacing: 0.2em; display: block; margin-bottom: 5px;
}
@keyframes revealGlow {
  0% { box-shadow: 0 3px 10px rgba(0,0,0,0.55); }
  50% { box-shadow: 0 0 20px rgba(201,168,76,0.6), 0 0 40px rgba(201,168,76,0.3); }
  100% { box-shadow: 0 3px 10px rgba(0,0,0,0.55); }
}
.placed-card.revealed { animation: revealGlow 0.8s ease-out; }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════ -->
<!-- FORM -->
<!-- ══════════════════════════════════════════ -->
<div class="form-wrap" id="formWrap">
  <div class="cards-icon">
    <div class="mini-card back"></div>
    <div class="mini-card face"><span class="mc-rank">A</span><span class="mc-suit">&#9830;</span></div>
    <div class="mini-card face"><span class="mc-rank">A</span><span class="mc-suit">&#9829;</span></div>
    <div class="mini-card back"></div>
  </div>
  <div class="form-title">Hand Replay</div>
  <div class="form-subtitle">Pega tu mano y genera el replay al instante</div>

  <div class="form-row">
    <span class="form-label">Tipo de juego</span>
    <div class="toggle-group">
      <div class="toggle-btn active" id="tCash" onclick="setType('cash')">Cash</div>
      <div class="toggle-btn" id="tTorneo" onclick="setType('torneo')">Torneo</div>
    </div>
  </div>

  <div class="input-row">
    <div class="form-row">
      <span class="form-label">Blinds</span>
      <input class="form-input" type="text" id="fBlinds" placeholder="ej: 5/10" />
    </div>
    <div class="form-row">
      <span class="form-label">Stack efectivo</span>
      <input class="form-input" type="text" id="fStack" placeholder="ej: 2000" />
    </div>
  </div>

  <div class="form-row ante-row" id="anteRow">
    <span class="form-label">Ante</span>
    <input class="form-input" type="text" id="fAnte" placeholder="ej: 2000" />
  </div>

  <div class="divider"></div>

  <div class="form-row">
    <span class="form-label">Pega tu mano aqui</span>

const $ = id => document.getElementById(id);

const API_URL = 'https://pokerreplayer.pokertopprous25.workers.dev/';

// ══════════════════════════════════════════
// FORM LOGIC
// ══════════════════════════════════════════
let gameType = 'cash';

$('btnGenerate').addEventListener('click', async () => {
  const blinds = $('fBlinds').value.trim();
  const stack = $('fStack').value.trim();
  const ante = $('fAnte').value.trim();
  const hand = $('fHand').value.trim();
  const question = $('fQuestion').value.trim();

  if (!blinds || !stack || !hand) {
    $('errorMsg').textContent = 'Por favor completa Blinds, Stack y la mano.';

  try {

    currentHandData = handData;
    // Update URL so it's shareable (may fail in iframes)
    try {
      const encoded = encodeHandToURL(handData);

    $('loadingOverlay').classList.remove('show');

$('btnNewHand').addEventListener('click', () => {

  try { history.replaceState(null, '', window.location.pathname); } catch(e) {}

// ── SHARE SYSTEM — encode hand to URL ──
let currentHandData = null;

function encodeHandToURL(hd) {
  const json = JSON.stringify(hd);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  return encoded;
}

function decodeHandFromURL(param) {
  const json = decodeURIComponent(escape(atob(param)));
  return JSON.parse(json);
}

$('btnShare').addEventListener('click', () => {
  if (!currentHandData) return;
  const encoded = encodeHandToURL(currentHandData);
  let url;
  try {
    url = window.location.origin + window.location.pathname + '?h=' + encoded;
  } catch(e) {
    url = '?h=' + encoded;
  }
  // Try clipboard API, fallback to manual copy
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => {
      showToast();
    }).catch(() => fallbackCopy(url));
  } else {
    fallbackCopy(url);
  }
});

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); showToast(); } catch(e) { prompt('Copia este link:', text); }
  document.body.removeChild(ta);
}

function showToast() {
  $('shareToast').classList.add('show');
  setTimeout(() => $('shareToast').classList.remove('show'), 2500);
}

// ── CHECK URL ON LOAD — auto-play if hand data in URL ──
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const handParam = params.get('h');
  if (handParam) {
    try {
      const hd = decodeHandFromURL(handParam);
      currentHandData = hd;
      $('formWrap').classList.add('hidden');
      $('replayWrap').classList.add('show');
      initReplay(hd);
    } catch (e) {
      console.error('Invalid hand data in URL', e);
    }
  }
});

// ══════════════════════════════════════════
// CLAUDE API — Parse hand text into structured JSON
// ══════════════════════════════════════════
async function parseHandWithClaude(type, blinds, stack, ante, handText, question) {
  const systemPrompt = `You are an expert poker hand parser. Parse free-text poker hands (Spanish/English) into structured JSON. Return ONLY valid JSON — no markdown, no backticks, no explanation.

CRITICAL PARSING RULES FOR COMPACT NOTATION:
- Hands are written in a compressed format where streets are separated by the board cards
- The FIRST group of 3 single-digit/letter cards after preflop action = FLOP (e.g. "974" = 9,7,4 or "AJ9" = A,J,9 or "T54" = T,5,4)
- The NEXT single card after flop action = TURN (e.g. "3" or "K" or "T")
- The NEXT single card after turn action = RIVER (e.g. "2" or "A" or "6")
- Board cards are often glued to the previous pot number: "paga140 3xx" means pot=140, then flop has been shown, turn=3, xx=check-check
- Cards like T=10, J=Jack, Q=Queen, K=King, A=Ace
- "974cb 35" = flop is 9-7-4, then cbet 35
- "3xx" = turn is 3, then check-check
- "2Betea 55" = river is 2, then bet 55

HAND FORMAT EXAMPLES:
"88Or 35 Def BB 974cb 35 paga 3xx 2Betea 55 pago tiene K9hh"
= Hero has 88, open raise 35, BB defends. Flop 9-7-4, cbet 35, BB calls. Turn 3, check-check. River 2, bet 55, call. Villain has K9hh.

"Q8ss Or 60 HJ paga SB 160 AJ9hh cb 100 paga 360 5 cb 400 paga 1160 5 Donk 500 all in 1600 paga tiene A3cc"
= Hero has Q8ss, raises 60 from HJ. SB calls. Pot 160. Flop AJ9 (two hearts), cbet 100, call. Pot 360. Turn 5, cbet 400, call. Pot 1160. River 5, donk 500, all-in 1600, call. Villain has A3cc.

"KQoROL 50 CO paga D Reg 120 J93dd xx A Delayed 75 paga Q xf a 300"
= Hero has KQo (offsuit). There is a limper (UTG limps 10). Hero raises (ROL=raise over limper) to 50. CO is hero's position. BTN (villain, described as Reg) calls 50. Pot 120. Flop J-9-3 (two diamonds). Check-check. Turn A. Hero delayed cbet 75, villain calls. River Q. Hero check, villain bets 300, hero folds. Villain wins.

"QThhOr Utg 16k paga CO paga BB 60000 J83cb 16k paga CO 92000 7hhh xr de 36k a Push 217k foldea y gano"
= Hero has QThh in UTG. Raises 16k. CO calls 16k. BB calls (SB FOLDS - not mentioned). Pot 60000. Flop J-8-3 (one heart). Cbet 16k, CO calls. Pot 92000. Turn 7h (2 hearts on board now). Hero checks, CO bets 36k, Hero all-in 217k, CO folds. Hero wins.

PREFLOP SPECIAL ACTIONS:
- "ROL" = Raise Over Limper. This means someone limped (called the BB) BEFORE hero raised. 
- If the limper's position is NOT specified, always put the limper at UTG (earliest position)
- A limper calls the BB amount. Use action "call" with amount equal to BB (e.g. in 5/10, amount: 10)
- After ROL, the limper usually folds to the raise (unless text says otherwise)
- "Or" / "open raise" = raise with NO limper before
- "3bet" = re-raise after someone raised. "4bet" = re-re-raise.
- "Def" / "defiende" = call a raise (typically from BB or SB)

CRITICAL: EVERY call, bet, raise, and allin action MUST have an "amount" field with the correct number. NEVER set amount to 0 or omit it.
- Limp/call preflop = amount equals the BB or the raise amount
- Call post-flop = amount equals the bet amount being called
- "paga" after a bet of 75 = call with amount 75

IMPORTANT PREFLOP RULES:
- SB and BB post their blinds automatically — do NOT add call actions for them posting blinds
- If text says "paga CO" and "paga BB" after a raise, ONLY CO and BB call. SB FOLDS unless explicitly mentioned as calling
- "paga BB" means BB calls the raise (pays the difference between BB and raise amount)
- SB folds unless the text explicitly says SB calls/defends/pays
- When calculating BB's call amount: BB already posted the blind, so BB pays (raise_amount - BB_blind)
- Do NOT confuse blind posting with calling. SB posting 4k blind is NOT a call

CARD FORMAT:
- "KQo" = K and Q offsuit (different suits). Assign different suits like K♠Q♥
- "KQs" = K and Q suited (same suit). Assign same suit like K♠Q♠
- "88" = pocket pair 8-8 (always different suits, e.g. 8♠8♥)
- "ATs" = A and T suited
- "ATo" = A and T offsuit
- When no "s" or "o" suffix and not a pair, default to offsuit

POSITION PARSING:
- "Or 35" or "open raise 35" or "abre 35" = hero raises
- "Def" or "defiende" or "paga" or "call" = call
- "Reg" = regular player (not hero), use as villain name context
- The position mentioned (BB, SB, HJ, CO, UTG, etc.) tells you who is involved
- "Def BB" = BB defends/calls. "paga SB" = SB calls.

ACTION PARSING:
- "cb" / "cbet" / "c-bet" = continuation bet (action: "bet")
- "Delayed" / "delayed cbet" / "delayed cb" = bet on a later street after checking the previous (action: "bet")
- "xc" = check-call (two actions: check then call)
- "xr" = check-raise (two actions: check then raise)  
- "xf" / "xf a 300" = check-fold (hero checks, villain bets amount, hero folds). Generate THREE actions: hero check, villain bet [amount], hero fold
- "xx" = check-check (both players check)
- "Donk" / "donkea" = out-of-position bet (action: "bet")
- "Betea" / "bet" / "apuesta" = bet
- "pago" / "paga" / "call" = call
- "fold" / "foldea" = fold
- "all in" / "allin" / "push" / "lo pongo all in" = allin
- Numbers after actions = amounts (e.g. "cb 35" = bet 35, "Betea 55" = bet 55)

SUIT PARSING:
- "ss" = both spades, "cc" = both clubs, "hh" = both hearts, "dd" = both diamonds
- "K9hh" = K♥9♥ (both hearts)
- "A3cc" = A♣3♣ (both clubs)
- "Q8ss" = Q♠8♠ (both spades)
- "KQo" = offsuit (different suits). "KQs" = suited (same suit)
- If board suits not specified, assign different suits (rainbow)
- BOARD suit suffixes: "J93dd" = TWO of the three flop cards are diamonds, third is different suit
- "AJ9hh" = two of the three are hearts, third is different
- "974" with no suit = rainbow (three different suits)
- Turn/River suits: "7hhh" or "7h" after a flop with hearts = turn is 7♥. The "hhh" means there are now 3 hearts total on board (flop had 1-2 hearts + this turn heart)
- When assigning board suits, never reuse a suit that a player's hole cards already have unless specified
- "xr" on turn/river = check, then when opponent bets, raise. "xr de 36k a Push 217k" = opponent bets 36k, hero raises all-in to 217k
- "Push" = all-in (action: "allin")

PLAYER IDENTIFICATION:
- Hero is always the one whose cards are shown first
- Hero's position can be stated explicitly (e.g. "CO" after the hand) or inferred from context
- If text says "Or 35" without position, hero's position comes from the form or context
- "Def BB" means BB is defending/calling
- "paga D" or "paga BTN" = BTN calls
- "Reg" = regular player (villain). Descriptors like "Griego viejo Tight" describe the villain's profile but don't change the parsing
- "D" alone can mean BTN (Dealer) position
- Include ALL 8 positions in preflop actions (utg,utg1,lj,hj,co,btn,sb,bb) — fold everyone not explicitly mentioned as acting
- If a limper is mentioned but position not specified, default to UTG

WINNER DETECTION:
- If villain shows cards and hero bet/called last = showdown, compare hands
- If hero folds (including "xf") = villain wins, showdown: false
- If villain folds = hero wins, showdown: false
- "tiene K9hh" = villain shows K9 hearts = showdown: true
- If no showdown, villain cards can still be null

OUTPUT FORMAT:
{
  "gameType": "cash" or "tournament",
  "blinds": { "sb": number, "bb": number },
  "ante": number or 0,
  "effectiveStack": number,
  "heroPosition": "utg"|"utg1"|"lj"|"hj"|"co"|"btn"|"sb"|"bb",
  "heroCards": [{"rank":"Q","suit":"s","suitSymbol":"♠","color":"black"}, {"rank":"8","suit":"s","suitSymbol":"♠","color":"black"}],
  "villainCards": [{"rank":"A","suit":"c","suitSymbol":"♣","color":"black"}, {"rank":"3","suit":"c","suitSymbol":"♣","color":"black"}] or null,
  "board": {
    "flop": [{"rank":"A","suit":"h","suitSymbol":"♥","color":"red"}, ...] or null,
    "turn": {"rank":"5","suit":"s","suitSymbol":"♠","color":"black"} or null,
    "river": {"rank":"6","suit":"d","suitSymbol":"♦","color":"red"} or null
  },
  "actions": [
    {"street":"preflop","player":"utg","action":"fold"},
    ...
  ],
  "winner": "sb" or "hj" or null,
  "showdown": true or false,
  "question": "the question text"
}

Suits: s=♠(black), c=♣(black), h=♥(red), d=♦(red)
8-max table positions: utg, utg1, lj, hj, co, btn, sb, bb
OOP acts first post-flop.
Include ALL folds from non-participating players.`;

  const userMsg = `Game type: ${type}
Blinds: ${blinds}
Stack: ${stack}
${ante ? 'Ante: ' + ante : ''}
Hand: ${handText}
${question ? 'Question: ' + question : ''}`;

  const response = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 2000,
      system: systemPrompt,
      messages: [{ role: "user", content: userMsg }]
    })
  });

  const data = await response.json();
  const text = data.content.map(c => c.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

// ══════════════════════════════════════════
// REPLAY ENGINE — takes parsed JSON and runs the replay
// ══════════════════════════════════════════
let handData, seatMap, heroPosition, activePlayers, stacks, cardDefs;
let phase, dealIndex, stepIndex, playing, autoTimer, steps;
const STEP_DELAY = 2400;

function fmt(n) { return typeof n === 'number' ? n.toLocaleString() : n; }

function initReplay(hd) {
  handData = hd;
  heroPosition = hd.heroPosition;

  // Build seat map — hero always at slot0
  const heroIdx = ALL_POSITIONS.indexOf(heroPosition);
  seatMap = [];
  for (let i = 0; i < 8; i++) seatMap.push(ALL_POSITIONS[(heroIdx + i) % 8]);

  // Figure out which players are active (not folding preflop)
  const preflopFolds = new Set();
  hd.actions.filter(a => a.street === 'preflop' && a.action === 'fold').forEach(a => preflopFolds.add(a.player));
  activePlayers = ALL_POSITIONS.filter(p => !preflopFolds.has(p));

  // Card definitions
  cardDefs = {};
  if (hd.heroCards) {
    cardDefs[heroPosition + '-0'] = { rank: hd.heroCards[0].rank, suit: hd.heroCards[0].suitSymbol, color: hd.heroCards[0].color };
    cardDefs[heroPosition + '-1'] = { rank: hd.heroCards[1].rank, suit: hd.heroCards[1].suitSymbol, color: hd.heroCards[1].color };
  }
  if (hd.villainCards) {
    const villainPos = activePlayers.find(p => p !== heroPosition) || 'bb';
    cardDefs[villainPos + '-0'] = { rank: hd.villainCards[0].rank, suit: hd.villainCards[0].suitSymbol, color: hd.villainCards[0].color };
    cardDefs[villainPos + '-1'] = { rank: hd.villainCards[1].rank, suit: hd.villainCards[1].suitSymbol, color: hd.villainCards[1].color };
  }
  // Random cards for unknown players
  const usedSet = new Set();
  Object.values(cardDefs).forEach(c => usedSet.add(c.rank + c.suit));
  const suits = ['♠','♣','♥','♦'], ranks = ['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
  function rndCard() {
    let c; do { c = ranks[Math.floor(Math.random()*13)] + suits[Math.floor(Math.random()*4)]; } while(usedSet.has(c));
    usedSet.add(c); const s = c.slice(-1);
    return { rank: c.slice(0,-1), suit: s, color: (s==='♥'||s==='♦') ? 'red' : 'black' };
  }
  ALL_POSITIONS.forEach(p => { if (!cardDefs[p+'-0']) { cardDefs[p+'-0'] = rndCard(); cardDefs[p+'-1'] = rndCard(); } });

  // Build board HTML
  const boardArea = $('boardArea');
  boardArea.innerHTML = '';
  const allBoard = [];
  if (hd.board.flop) allBoard.push(...hd.board.flop);
  if (hd.board.turn) allBoard.push(hd.board.turn);
  if (hd.board.river) allBoard.push(hd.board.river);
  allBoard.forEach((card, i) => {
    const div = document.createElement('div');
    div.className = 'board-card ' + card.color;
    div.id = 'bc' + (i + 1);
    div.innerHTML = `<span class="rank">${card.rank}</span><span class="suit">${card.suitSymbol}</span>`;
    boardArea.appendChild(div);
  });

  // Question
  const qText = hd.question || '';
  $('questionText').textContent = qText;
  // Hide box if no question
  if (!qText) $('questionBox').style.display = 'none';
  else $('questionBox').style.display = '';

  // Build seats — create chip zones for ALL players who take any action
  const playersWithActions = new Set(['sb', 'bb']);
  hd.actions.forEach(a => playersWithActions.add(a.player));
  
  seatMap.forEach((pos, slotIdx) => {
    const seatEl = $('seat-' + slotIdx);
    seatEl.className = 'player ' + SLOT_CLASSES[slotIdx];
    const isHero = pos === heroPosition;
    const isBottom = slotIdx === 0 || slotIdx === 1 || slotIdx === 7;
    const chipZoneHTML = playersWithActions.has(pos) ?
      `<div class="chip-zone" id="chips-${pos}"><div class="chip-stack" id="chipstack-${pos}"></div><div class="chip-amount" id="chipamt-${pos}"></div></div>` : '';
    const checkHTML = `<div class="check-label" id="check-${pos}">CHECK</div>`;
    const labelHTML = `<div class="seat-label${isHero?' hero':''}" id="lbl-${pos}">
      <span class="pos">${pos.toUpperCase()}${isHero?' · HERO':''}</span>
      <div class="name-row"><span class="name">${isHero?'Hero':'Seat '+(slotIdx+1)}</span><span class="stack" id="stk-${pos}">${fmt(hd.effectiveStack)}</span></div>
    </div>`;
    const cardsHTML = `<div class="player-row">
      ${isBottom ? chipZoneHTML : ''}
      <div class="hole-cards"><div class="placed-card face-down" id="${pos}-0"></div><div class="placed-card face-down" id="${pos}-1"></div>${checkHTML}</div>
      ${!isBottom ? chipZoneHTML : ''}
    </div>`;
    if (isBottom) seatEl.innerHTML = cardsHTML + labelHTML;
    else seatEl.innerHTML = labelHTML + cardsHTML;
  });

  // Init stacks
  stacks = {};
  ALL_POSITIONS.forEach(p => stacks[p] = hd.effectiveStack);

  // Build steps from actions
  buildSteps(hd);

  // Start
  phase = 'blinds';
  dealIndex = 0; stepIndex = 0; playing = false;
  setTimeout(() => postBlindsAndDeal(), 500);
}

// ══════════════════════════════════════════
// STEP BUILDER — converts actions array into replay steps
// ══════════════════════════════════════════
function buildSteps(hd) {
  steps = [];
  let pot = hd.blinds.sb + hd.blinds.bb + (hd.ante || 0);
  const invested = {};
  ALL_POSITIONS.forEach(p => invested[p] = 0);

  const streets = ['preflop','flop','turn','river'];
  let boardCardIdx = 0;

  streets.forEach(street => {
    const streetActions = hd.actions.filter(a => a.street === street);
    if (streetActions.length === 0) return;

    if (street === 'preflop') {
      steps.push({fn() { setStreet('PREFLOP'); }});
    }

    if (street === 'flop') {
      // Collect preflop chips, then show flop
      steps.push({fn() {
        lightSeat(null); setAction('💫 Fichas al pozo...');
        hideAnte();
        collectToPot(pot, 'POT: ' + fmt(pot), () => { setPot('POT: ' + fmt(pot)); });
      }});
      steps.push({fn() {
        lightSeat(null); hideAllChips(); setStreet('FLOP'); setPot('POT: ' + fmt(pot));
        seatMap.forEach((pos, si) => { if (!activePlayers.includes(pos)) $('seat-'+si).classList.add('faded'); });
        showBoardCard('bc1', 0); showBoardCard('bc2', 140); showBoardCard('bc3', 280);
        const f = hd.board.flop;
        setAction('🂠 Flop: ' + f.map(c=>c.rank+c.suitSymbol).join('  '));
      }});
      boardCardIdx = 3;
    }

    if (street === 'turn') {
      steps.push({fn() {
        lightSeat(null); setAction('💫 Fichas al pozo...');
        collectToPot(pot, 'POT: ' + fmt(pot), () => { setPot('POT: ' + fmt(pot)); });
      }});
      steps.push({fn() {
        lightSeat(null); hideAllChips(); setStreet('TURN'); setPot('POT: ' + fmt(pot));
        showBoardCard('bc4', 0);
        setAction('🂠 Turn: ' + hd.board.turn.rank + hd.board.turn.suitSymbol);
      }});
      boardCardIdx = 4;
    }

    if (street === 'river') {
      // Only collect if there were bets on turn
      const turnBets = hd.actions.filter(a => a.street === 'turn' && (a.action === 'bet' || a.action === 'raise' || a.action === 'call' || a.action === 'allin'));
      if (turnBets.length > 0) {
        steps.push({fn() {
          lightSeat(null); setAction('💫 Fichas al pozo...');
          collectToPot(pot, 'POT: ' + fmt(pot), () => { setPot('POT: ' + fmt(pot)); });
        }});
      }
      steps.push({fn() {
        lightSeat(null); hideAllChips(); hideAllChecks(); setStreet('RIVER'); setPot('POT: ' + fmt(pot));
        showBoardCard('bc5', 0);
        setAction('🂠 River: ' + hd.board.river.rank + hd.board.river.suitSymbol);
      }});
      boardCardIdx = 5;
    }

    streetActions.forEach(act => {
      const p = act.player;
      const lbl = 'lbl-' + p;
      const isHero = p === heroPosition;
      const name = isHero ? 'Hero' : p.toUpperCase();

      switch (act.action) {
        case 'fold':
          steps.push({fn() {
            lightSeat(lbl);
            if (street === 'preflop' && $('chips-'+p)) hideChips(p);
            setAction('❌ ' + name + ' fold');
            foldSeat(p);
          }});
          break;
        case 'check':
          steps.push({fn() {
            lightSeat(lbl); hideAllChecks();
            showCheck(p);
            setAction('✋ ' + name + ' check');
          }});
          break;
        case 'call':
          const callAmt = act.amount || 0;
          steps.push({fn() {
            lightSeat(lbl); hideAllChecks();
            if (callAmt > 0) {
              showChips(p, callAmt, fmt(callAmt), 'call');
              stacks[p] -= callAmt;
              setStack(p, stacks[p]);
            }
            pot += callAmt;
            setPot('POT: ' + fmt(pot));
            setAction('✅ ' + name + ' call ' + fmt(callAmt));
          }});
          break;
        case 'limp':
          const limpAmt = act.amount || hd.blinds.bb;
          steps.push({fn() {
            lightSeat(lbl); hideAllChecks();
            showChips(p, limpAmt, fmt(limpAmt), 'call');
            stacks[p] -= limpAmt;
            setStack(p, stacks[p]);
            pot += limpAmt;
            setPot('POT: ' + fmt(pot));
            setAction('✅ ' + name + ' limp ' + fmt(limpAmt));
          }});
          break;
        case 'bet':
        case 'raise':
        case 'donk':
          const betAmt = act.amount || 0;
          const actLabel = act.action === 'raise' ? 'raise' : act.action === 'donk' ? 'bet' : 'bet';
          steps.push({fn() {
            lightSeat(lbl); hideAllChecks();
            showChips(p, betAmt, fmt(betAmt), actLabel);
            stacks[p] -= betAmt; invested[p] += betAmt;
            setStack(p, stacks[p]);
            pot += betAmt;
            setPot('POT: ' + fmt(pot));
            const emoji = act.action === 'raise' ? '📢' : '💰';
            setAction(emoji + ' ' + name + ' ' + act.action + ' ' + fmt(betAmt));
          }});
          break;
        case 'allin':
          const allAmt = act.amount || stacks[p];
          steps.push({fn() {
            lightSeat(lbl); hideAllChecks();
            showChips(p, allAmt, fmt(allAmt) + ' ALL-IN', 'allin');
            stacks[p] = 0; invested[p] += allAmt;
            setStack(p, 0);
            pot += allAmt;
            setPot('POT: ' + fmt(pot));
            setAction('🔥 ' + name + ' ALL-IN ' + fmt(allAmt) + '!');
          }});
          break;
      }
    });
  });

  // SHOWDOWN
  if (hd.showdown && hd.winner) {
    const winnerPos = hd.winner;
    const villainPos = activePlayers.find(p => p !== heroPosition);
    steps.push({fn() {
      lightSeat(null); setAction('💫 Fichas al pozo...');
      collectToPot(pot, 'POT: ' + fmt(pot), () => {
        setPot('POT: ' + fmt(pot));
        if (hd.villainCards && villainPos) {
          setTimeout(() => {
            revealCards(villainPos, () => {
              const vc = hd.villainCards;
              setAction('🃏 ' + villainPos.toUpperCase() + ' muestra ' + vc[0].rank + vc[0].suitSymbol + vc[1].rank + vc[1].suitSymbol + ' — ' + winnerPos.toUpperCase() + ' gana 🏆');
              setTimeout(() => {
                collectToWinner(winnerPos, pot, () => {
                  setAction('💰 ' + winnerPos.toUpperCase() + ' cobra ' + fmt(pot));
                  setTimeout(() => $('questionBox').classList.add('show'), 800);
                });
              }, 1000);
            });
          }, 600);
        } else {
          setTimeout(() => {
            collectToWinner(winnerPos, pot, () => {
              setAction('💰 ' + winnerPos.toUpperCase() + ' cobra ' + fmt(pot));
              setTimeout(() => $('questionBox').classList.add('show'), 800);
            });
          }, 600);
        }
      });
    }});
  } else if (hd.winner) {
    // No showdown — winner takes pot without reveal
    steps.push({fn() {
      lightSeat(null);
      setTimeout(() => {
        collectToPot(pot, 'POT: ' + fmt(pot), () => {
          setPot('POT: ' + fmt(pot));
          setTimeout(() => {
            collectToWinner(hd.winner, pot, () => {
              setAction('💰 ' + hd.winner.toUpperCase() + ' cobra ' + fmt(pot));
              setTimeout(() => $('questionBox').classList.add('show'), 800);
            });
          }, 600);
        });
      }, 400);
    }});
  }
}

// REPLAY ENGINE FUNCTIONS

const DENOMS = [{val:500,cls:'c500'},{val:100,cls:'c100'},{val:25,cls:'c25'},{val:10,cls:'c10'},{val:5,cls:'c5'},{val:1,cls:'c1'}];
function buildChips(amount) {
  const visual = amount >= 10000 ? Math.round(amount/1000) : amount;
  const chips=[]; let rem=visual;
  for(const d of DENOMS){ const n=Math.floor(rem/d.val); for(let i=0;i<Math.min(n,4);i++) chips.push(d.cls); rem-=n*d.val; if(rem<=0)break; }
  if(chips.length===0) chips.push('c1');
  return chips;
}

function showChips(seat,amount,label,action) {
  const zone=$('chips-'+seat); if(!zone)return;
  const stack=$('chipstack-'+seat), amt=$('chipamt-'+seat);
  stack.innerHTML=''; buildChips(amount).forEach(cls=>{ const c=document.createElement('div'); c.className='chip '+cls; stack.appendChild(c); });
  amt.innerHTML='';
  if(action){ const lbl=document.createElement('div'); lbl.className='chip-action '+action.toLowerCase(); lbl.textContent=action.toUpperCase(); amt.appendChild(lbl); }
  const val=document.createElement('div'); val.className='chip-value'; val.textContent=label||fmt(amount); amt.appendChild(val);
  zone.classList.add('show');
}
function hideChips(seat){ const z=$('chips-'+seat); if(z){z.classList.remove('show'); const s=$('chipstack-'+seat); if(s)s.innerHTML=''; const a=$('chipamt-'+seat); if(a)a.innerHTML='';} }
function hideAllChips(){ ALL_POSITIONS.forEach(s=>hideChips(s)); }

function setStack(pos, amount) { stacks[pos]=amount; const el=$('stk-'+pos); if(el) el.textContent=fmt(amount); }
function setStreet(name){ const sl=$('streetLabel'); sl.classList.remove('show'); setTimeout(()=>{ sl.textContent=name; sl.classList.add('show'); },200); }
function setPot(txt,show=true){ $('potDisplay').textContent=txt; $('potDisplay').classList.toggle('show',show); }
function setAction(txt){ const ab=$('actionBubble'); ab.classList.remove('show'); setTimeout(()=>{ ab.textContent=txt; ab.classList.add('show'); },120); }
function lightSeat(id){ ALL_POSITIONS.forEach(s=>{ const el=$('lbl-'+s); if(el) el.classList.remove('lit'); }); if(id) $(id).classList.add('lit'); }
function showBoardCard(id,delay){ setTimeout(()=>{ const el=$(id); if(el) el.classList.add('show'); },delay); }
function updateProgress(i,total){ $('progressFill').style.width=((i+1)/total*100)+'%'; }
function showCheck(pos){ const el=$('check-'+pos); if(el) el.classList.add('show'); }
function hideCheck(pos){ const el=$('check-'+pos); if(el) el.classList.remove('show'); }
function hideAllChecks(){ ALL_POSITIONS.forEach(p=>hideCheck(p)); }
function foldSeat(pos){ const lbl=$('lbl-'+pos); if(lbl) lbl.classList.add('folded'); [pos+'-0',pos+'-1'].forEach(cid=>{ const el=$(cid); if(el) el.classList.add('folded'); }); }
function unfoldSeat(pos){ const lbl=$('lbl-'+pos); if(lbl) lbl.classList.remove('folded'); [pos+'-0',pos+'-1'].forEach(cid=>{ const el=$(cid); if(el) el.classList.remove('folded'); }); }
function unfadeAll(){ for(let i=0;i<8;i++) $('seat-'+i).classList.remove('faded'); ALL_POSITIONS.forEach(p=>unfoldSeat(p)); }

function revealCards(seat, cb) {
  [seat+'-0',seat+'-1'].forEach((slotId,i)=>{
    setTimeout(()=>{
      const slot=$(slotId), def=cardDefs[slotId]; if(!def||!slot) { if(i===1&&cb) cb(); return; }
      slot.style.transition='transform 0.15s ease-in'; slot.style.transform='rotateY(90deg)';
      setTimeout(()=>{
        slot.classList.remove('face-down'); slot.classList.add(def.color,'revealed');
        slot.innerHTML=`<span class="rank">${def.rank}</span><span class="suit">${def.suit}</span>`;
        slot.style.transition='transform 0.15s ease-out'; slot.style.transform='rotateY(0deg)';
        if(i===1&&cb) setTimeout(cb,300);
      },150);
    },i*250);
  });
}

const chipColorMap={c500:'linear-gradient(180deg,#aa33cc,#661a88)',c100:'linear-gradient(180deg,#222,#000)',c25:'linear-gradient(180deg,#33aa55,#1a6633)',c10:'linear-gradient(180deg,#3366dd,#1a3a99)',c5:'linear-gradient(180deg,#e83010,#aa1800)',c1:'linear-gradient(180deg,#f0f0f0,#c8c8c8)'};

function collectToPot(potAmount,label,cb) {
  const potZone=$('potChipZone'), potRect=potZone.getBoundingClientRect();
  const targetX=potRect.left+potRect.width/2-15, targetY=potRect.top+potRect.height/2-5;
  let totalFlying=0, landed=0;
  ALL_POSITIONS.forEach((seat,si)=>{
    const stack=$('chipstack-'+seat); if(!stack) return;
    const chips=stack.querySelectorAll('.chip'); if(!chips.length) return;
    chips.forEach((chip,ci)=>{
      const cls=Array.from(chip.classList).find(c=>c!=='chip')||'c25';
      const rect=chip.getBoundingClientRect();
      const fly=document.createElement('div'); fly.className='flying-chip';
      fly.style.background=chipColorMap[cls]||'#888';
      fly.style.left=rect.left+'px'; fly.style.top=rect.top+'px'; fly.style.opacity='1';
      document.body.appendChild(fly); totalFlying++;
      setTimeout(()=>{
        fly.style.left=targetX+'px'; fly.style.top=targetY+'px'; fly.style.opacity='0';
        fly.addEventListener('transitionend',function h(e){ if(e.propertyName!=='left')return; fly.removeEventListener('transitionend',h); fly.remove(); landed++; if(landed===totalFlying){ showPotChips(potAmount,label); if(cb) setTimeout(cb,300); } });
      }, ci*40+si*30);
    });
  });
  hideAllChips();
  if(totalFlying===0){ showPotChips(potAmount,label); if(cb) setTimeout(cb,300); }
}

function showPotChips(amount,label) {
  const zone=$('potChipZone'),stack=$('potChipStack'),lbl=$('potChipLabel');
  stack.innerHTML=''; buildChips(amount).forEach(cls=>{ const c=document.createElement('div'); c.className='chip '+cls; stack.appendChild(c); });
  lbl.textContent=label||('POT: '+fmt(amount)); zone.classList.add('show');
}
function hidePotChips(){ $('potChipZone').classList.remove('show'); $('potChipStack').innerHTML=''; $('potChipLabel').textContent=''; }

function collectToWinner(winnerSeat, potAmount, cb) {
  const potStack=$('potChipStack');
  const chips=potStack.querySelectorAll('.chip'); if(!chips.length){ if(cb)cb(); return; }
  const winnerLbl=$('lbl-'+winnerSeat); if(!winnerLbl){ if(cb)cb(); return; }
  const targetRect=winnerLbl.getBoundingClientRect();
  const targetX=targetRect.left+targetRect.width/2-15, targetY=targetRect.top+targetRect.height/2-5;
  let totalFlying=0, landed=0;
  chips.forEach((chip,ci)=>{
    const cls=Array.from(chip.classList).find(c=>c!=='chip')||'c25';
    const rect=chip.getBoundingClientRect();
    const fly=document.createElement('div'); fly.className='flying-chip';
    fly.style.background=chipColorMap[cls]||'#888';
    fly.style.left=rect.left+'px'; fly.style.top=rect.top+'px'; fly.style.opacity='1';
    document.body.appendChild(fly); totalFlying++;
    setTimeout(()=>{
      fly.style.left=targetX+'px'; fly.style.top=targetY+'px'; fly.style.opacity='0';
      fly.addEventListener('transitionend',function h(e){
        if(e.propertyName!=='left')return; fly.removeEventListener('transitionend',h); fly.remove(); landed++;
        if(landed===totalFlying){ hidePotChips(); $('potDisplay').classList.remove('show'); setStack(winnerSeat, stacks[winnerSeat]+potAmount); if(cb) setTimeout(cb,300); }
      });
    }, ci*40);
  });
}

function showAnte(amount, label) {
  const zone=$('anteZone'),stack=$('anteChipStack'),lbl=$('anteLabel');
  stack.innerHTML=''; buildChips(amount).forEach(cls=>{ const c=document.createElement('div'); c.className='chip '+cls; stack.appendChild(c); });
  lbl.textContent=label; zone.classList.add('show');
}
function hideAnte(){ $('anteZone').classList.remove('show'); $('anteChipStack').innerHTML=''; $('anteLabel').textContent=''; }
function showAnteAtCenter(amount, label) { showAnte(amount, label); }

function flyAnteToCenter(cb) {
  const bbChipZone=$('chips-bb');
  const bbRect=bbChipZone?bbChipZone.getBoundingClientRect():null;
  const tableRect=$('table').getBoundingClientRect();
  const anteZone=$('anteZone');
  const anteRect=anteZone.getBoundingClientRect();
  const targetX=anteRect.left+anteRect.width/2-15;
  const targetY=anteRect.top+anteRect.height/2-5;
  const anteChips=buildChips(handData.ante);
  let totalFlying=anteChips.length, landed=0;
  if(totalFlying===0){ showAnteAtCenter(handData.ante,'ANTE '+fmt(handData.ante)); if(cb)cb(); return; }
  const startX=bbRect?bbRect.left+bbRect.width/2-15:targetX;
  const startY=bbRect?bbRect.top:targetY;
  anteChips.forEach((cls,ci)=>{
    const fly=document.createElement('div'); fly.className='flying-chip';
    fly.style.background=chipColorMap[cls]||'#888';
    fly.style.left=startX+'px'; fly.style.top=(startY-ci*3)+'px'; fly.style.opacity='1';
    document.body.appendChild(fly);
    setTimeout(()=>{
      fly.style.left=targetX+'px'; fly.style.top=targetY+'px'; fly.style.opacity='0';
      fly.addEventListener('transitionend',function h(e){
        if(e.propertyName!=='left')return; fly.removeEventListener('transitionend',h); fly.remove(); landed++;
        if(landed===totalFlying){ showAnteAtCenter(handData.ante,'ANTE '+fmt(handData.ante)); if(cb) setTimeout(cb,200); }
      });
    }, ci*40);
  });
}

// DEALER BUTTON
function positionDealerBtn() {
  const btnPos=seatMap.indexOf('btn');
  const btnSeat=$('seat-'+btnPos); if(!btnSeat) return;
  const tableRect=$('table').getBoundingClientRect();
  const db=$('dealerBtn');
  
  // If BTN is at slot0 (Hero, bottom center), put D to the right of the label
  if (btnPos === 0) {
    const lblEl=$('lbl-btn');
    if (lblEl) {
      const lblRect=lblEl.getBoundingClientRect();
      db.style.left=(lblRect.right+6-tableRect.left)+'px';
      db.style.top=(lblRect.top+lblRect.height/2-13-tableRect.top)+'px';
    }
  } else {
    const seatRect=btnSeat.getBoundingClientRect();
    const cx=tableRect.left+tableRect.width/2, cy=tableRect.top+tableRect.height/2;
    const sx=seatRect.left+seatRect.width/2, sy=seatRect.top+seatRect.height;
    const dx=cx-sx, dy=cy-sy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const nx=dx/dist, ny=dy/dist;
    db.style.left=(sx+nx*55+20-tableRect.left-13)+'px';
    db.style.top=(sy+ny*20-10-tableRect.top-13)+'px';
  }
  db.classList.add('show');
}
function hideDealerBtn(){ $('dealerBtn').classList.remove('show'); }

// DEALING
function getPos(el){ const r=el.getBoundingClientRect(); return{x:r.left,y:r.top}; }
function getTableCenter(){ const r=$('table').getBoundingClientRect(); return{x:r.left+r.width/2-23,y:r.top+r.height/2-33}; }

function animateDeal(slotId,cb) {
  const slot=$(slotId),dp=getTableCenter(),sp=getPos(slot);
  const fly=document.createElement('div'); fly.className='flying-card';
  fly.style.cssText=`left:${dp.x}px;top:${dp.y}px;width:46px;height:66px;position:fixed;transition:left 0.3s cubic-bezier(0.25,0.8,0.4,1),top 0.3s cubic-bezier(0.25,0.8,0.4,1),transform 0.3s;`;
  fly.style.transform=`rotate(${(Math.random()-0.5)*16}deg)`;
  document.body.appendChild(fly);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ fly.style.left=sp.x+'px'; fly.style.top=sp.y+'px'; fly.style.transform='rotate(0deg)'; }));
  fly.addEventListener('transitionend',function h(e){ if(e.propertyName!=='left')return; fly.removeEventListener('transitionend',h); fly.remove(); slot.style.opacity='1'; if(cb)cb(); });
}

const sbIdx = ALL_POSITIONS.indexOf('sb');
function getDealOrder() {
  const ds=[]; for(let i=0;i<8;i++) ds.push(ALL_POSITIONS[(sbIdx+i)%8]);
  const order=[]; ds.forEach(s=>order.push(s+'-0')); ds.forEach(s=>order.push(s+'-1'));
  return order;
}

function dealNext() {
  const dealOrder = getDealOrder();
  if(dealIndex>=dealOrder.length) {
    lightSeat(null);
    setTimeout(()=>flipHero(()=>{
      const hc = handData.heroCards;
      setAction('🎯 Hero: '+hc[0].rank+hc[0].suitSymbol+' '+hc[1].rank+hc[1].suitSymbol);
      phase='replay'; stepIndex=0; applyStep(0); startAuto();
    }),400);
    return;
  }
  const slotId=dealOrder[dealIndex];
  const seat=slotId.split('-')[0];
  const round=dealIndex<8?1:2;
  lightSeat('lbl-'+seat);
  setAction('🃏 Ronda '+round+' → '+seat.toUpperCase());
  animateDeal(slotId,()=>{ dealIndex++; setTimeout(dealNext,160); });
}

function flipHero(cb) {
  [heroPosition+'-0',heroPosition+'-1'].forEach((slotId,i)=>{
    setTimeout(()=>{
      const slot=$(slotId),def=cardDefs[slotId]; if(!def)return;
      slot.style.transition='transform 0.12s ease-in'; slot.style.transform='rotateY(90deg)';
      setTimeout(()=>{
        slot.classList.remove('face-down'); slot.classList.add(def.color);
        slot.innerHTML=`<span class="rank">${def.rank}</span><span class="suit">${def.suit}</span>`;
        slot.style.transition='transform 0.12s ease-out'; slot.style.transform='rotateY(0deg)';
        if(i===1&&cb) setTimeout(cb,200);
      },120);
    },i*220);
  });
}

function setPlayIcon(p){ const i=$('iconPlay'); if(p) i.innerHTML='<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>'; else i.innerHTML='<path d="M8 5v14l11-7z"/>'; }
function applyStep(i){ if(steps[i]){steps[i].fn(); updateProgress(i,steps.length);} }
function startAuto(){ playing=true; setPlayIcon(true); autoTimer=setInterval(()=>{ if(stepIndex<steps.length-1){stepIndex++;applyStep(stepIndex);}else stopAuto(); },STEP_DELAY); }
function stopAuto(){ playing=false; clearInterval(autoTimer); setPlayIcon(false); }

function postBlindsAndDeal() {
  positionDealerBtn();
  const sb=handData.blinds.sb, bb=handData.blinds.bb, ante=handData.ante||0;
  lightSeat('lbl-sb');
  showChips('sb',sb,fmt(sb),'blind'); setStack('sb',handData.effectiveStack-sb);
  setAction('🪙 SB pone ciega '+fmt(sb));
  setTimeout(()=>{
    lightSeat('lbl-bb');
    showChips('bb',bb,fmt(bb),'blind'); setStack('bb',handData.effectiveStack-bb);
    setAction('🪙 BB pone ciega '+fmt(bb));
    stacks['sb']=handData.effectiveStack-sb; stacks['bb']=handData.effectiveStack-bb;
    if(ante>0) {
      setTimeout(()=>{
        stacks['bb']-=ante; setStack('bb',stacks['bb']);
        setAction('🪙 BB pone ante '+fmt(ante)+' → al centro');
        flyAnteToCenter(()=>{
          const initPot=sb+bb+ante;
          setPot('POT: '+fmt(initPot)); setPot('POT: '+fmt(initPot),true);
          lightSeat(null); $('actionBubble').classList.remove('show');
          phase='dealing'; dealNext();
        });
      },1000);
    } else {
      setTimeout(()=>{
        const initPot=sb+bb;
        setPot('POT: '+fmt(initPot)); setPot('POT: '+fmt(initPot),true);
        lightSeat(null); $('actionBubble').classList.remove('show');
        phase='dealing'; dealNext();
      },1000);
    }
  },1000);
}

function hardReset() {
  stopAuto(); phase='idle'; dealIndex=0; stepIndex=0;
  document.querySelectorAll('.board-card').forEach(el=>el.classList.remove('show'));
  unfadeAll();
  ALL_POSITIONS.forEach(s=>{
    const lbl=$('lbl-'+s); if(lbl) lbl.classList.remove('lit','folded');
    [s+'-0',s+'-1'].forEach(cid=>{ const el=$(cid); if(el){ el.style.opacity='0'; el.style.transform=''; el.style.transition=''; el.className='placed-card face-down'; el.innerHTML=''; }});
  });
  ALL_POSITIONS.forEach(p=>{ stacks[p]=handData.effectiveStack; setStack(p,handData.effectiveStack); });
  hideAllChips(); hidePotChips(); hideAllChecks(); hideDealerBtn(); hideAnte();
  $('potDisplay').classList.remove('show');
  $('actionBubble').classList.remove('show');
  $('streetLabel').classList.remove('show');
  $('questionBox').classList.remove('show');
  $('progressFill').style.width='0%';
  document.querySelectorAll('.flying-card').forEach(e=>e.remove());
  document.querySelectorAll('.flying-chip').forEach(e=>e.remove());
  buildSteps(handData);
  setTimeout(postBlindsAndDeal,400);
}

$('btnPlayPause').addEventListener('click',()=>{
  if(phase==='replay'){ if(playing)stopAuto(); else{ if(stepIndex<steps.length-1){stepIndex++;applyStep(stepIndex);} startAuto(); } }
});
$('btnNext').addEventListener('click',()=>{
  if(phase==='replay'){ stopAuto(); if(stepIndex<steps.length-1){stepIndex++;applyStep(stepIndex);} }
});
$('btnPrev').addEventListener('click',()=>{
  if(phase!=='replay')return; stopAuto();
  if(stepIndex>0){
    stepIndex--;
    document.querySelectorAll('.board-card').forEach(el=>el.classList.remove('show'));
    unfadeAll();
    ALL_POSITIONS.forEach(s=>{ const lbl=$('lbl-'+s); if(lbl) lbl.classList.remove('lit','folded'); [s+'-0',s+'-1'].forEach(cid=>{ const el=$(cid); if(el) el.classList.remove('folded','revealed'); }); });
    ALL_POSITIONS.forEach(p=>{ stacks[p]=handData.effectiveStack; setStack(p,handData.effectiveStack); });
    hideAllChips(); hidePotChips(); hideAllChecks(); hideAnte();
    $('potDisplay').classList.remove('show');
    $('questionBox').classList.remove('show');
    buildSteps(handData);
    for(let i=0;i<=stepIndex;i++) steps[i].fn();
    updateProgress(stepIndex,steps.length);
  }
});
$('btnStop').addEventListener('click',hardReset);
</script>
</body>
</html>
